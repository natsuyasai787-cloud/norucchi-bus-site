<body>

<header>

<h1>
大分バスねっと
</h1>

<p>
大分のバスの運用情報サイト
</p>

</header>

<div class="login-card">

<h2>
ログイン
</h2>

<input
id="nameInput"
type="text"
placeholder="名前を入力">

<button onclick="login()">

ログイン

</button>

</div>

<div id="userArea"></div>

<div class="card">

<h2>
運用報告
</h2>

<a href="ここにGoogleフォームURL">

<button>

運用報告を投稿

</button>

</a>

</div>

<div class="card">

<h2>
写真投稿
</h2>

<a href="ここに写真投稿フォームURL">

<button>

写真を投稿

</button>

</a>

</div>

<script>

function login(){

const name =
document.getElementById("nameInput").value;

localStorage.setItem("username",name);

let posts =
Number(
localStorage.getItem(name + "_posts")
) || 0;

posts++;

localStorage.setItem(
name + "_posts",
posts
);

showUser();

}

function getRank(posts){

if(posts >= 100){

return "💎 プラチナ会員";

}

else if(posts >= 50){

return "🥇 ゴールド会員";

}

else if(posts >= 20){

return "🥈 シルバー会員";

}

else{

return "🥉 ブロンズ会員";

}

}

function showUser(){

const name =
localStorage.getItem("username");

if(name){

const posts =
Number(
localStorage.getItem(name + "_posts")
);

const rank =
getRank(posts);

document.getElementById("userArea")
.innerHTML = `

<div class="rank-card">

<h2>
こんにちは ${name}さん
</h2>

<p class="rank">
${rank}
</p>

<p>
投稿回数：${posts}回
</p>

</div>

`;

}

}

showUser();

</script>

</body>
