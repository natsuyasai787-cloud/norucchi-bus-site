<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
おおいたバスねっと
</title>

<link
rel="icon"
type="image/png"
href="busicon.png">

<meta
property="og:image"
content="busicon.png">

<style>

html{

scroll-behavior:smooth;

}

body{

margin:0;

font-family:sans-serif;

background:#0f0f0f;

color:white;

background-image:
repeating-linear-gradient(
45deg,
rgba(255,255,255,0.03) 0px,
rgba(255,255,255,0.03) 2px,
transparent 2px,
transparent 24px
),
repeating-linear-gradient(
-45deg,
rgba(255,255,255,0.03) 0px,
rgba(255,255,255,0.03) 2px,
transparent 2px,
transparent 24px
);

}

#opening{

position:fixed;

top:0;

left:0;

width:100%;

height:100vh;

background:#0a0a0a;

display:flex;

justify-content:center;

align-items:center;

z-index:9999;

animation:
openingFade 3s forwards;

}

#opening h1{

color:#d4af37;

font-size:42px;

letter-spacing:3px;

animation:
logoFade 2.5s ease;

}

@keyframes openingFade{

0%{

opacity:1;

}

70%{

opacity:1;

}

100%{

opacity:0;

visibility:hidden;

}

}

@keyframes logoFade{

0%{

opacity:0;

transform:
scale(0.8);

}

30%{

opacity:1;

transform:
scale(1);

}

100%{

opacity:0;

transform:
scale(1.1);

}

}

header{

background:
linear-gradient(
135deg,
#111111,
#222222
);

text-align:center;

padding:50px 20px;

border-bottom:
3px solid #d4af37;

box-shadow:
0 4px 15px rgba(0,0,0,0.5);

animation:
fadeIn 1s ease;

}

header h1{

margin:0;

font-size:38px;

color:#d4af37;

}

header p{

margin-top:10px;

color:#cccccc;

}

.login-card,
.rank-card,
.card{

background:#1a1a1a;

margin:25px;

padding:25px;

border-radius:20px;

border:
1px solid #333;

box-shadow:
0 4px 15px rgba(0,0,0,0.5);

opacity:0;

transform:
translateY(50px);

transition:
all 0.8s ease;

}

.show{

opacity:1;

transform:
translateY(0);

}

h2{

margin-top:0;

color:#d4af37;

}

input{

width:100%;

padding:14px;

margin-top:10px;

margin-bottom:15px;

font-size:18px;

border-radius:12px;

border:1px solid #555;

background:#111;

color:white;

box-sizing:border-box;

}

button{

width:100%;

padding:15px;

font-size:18px;

border:none;

border-radius:12px;

background:
linear-gradient(
135deg,
#d4af37,
#8b6f1e
);

color:black;

font-weight:bold;

margin-top:10px;

transition:
0.2s;

}

button:hover{

transform:
scale(1.02);

}

button:active{

transform:
scale(0.98);

}

.rank{

font-size:32px;

font-weight:bold;

text-align:center;

margin-top:15px;

}

.rank-card h2,
.rank-card p{

text-align:center;

}

.notice{

color:#aaa;

font-size:14px;

margin-top:10px;

}

iframe{

width:100%;

height:500px;

border:none;

border-radius:15px;

background:white;

}

.cooldown{

margin-top:10px;

color:#ffcc66;

text-align:center;

}

@keyframes fadeIn{

from{

opacity:0;

transform:
translateY(-30px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

</style>

</head>

<body>

<div id="opening">

<h1>
🚌 おおいたバスねっと
</h1>

</div>

<header>

<h1>
🚌 おおいたバスねっと
</h1>

<p>
大分バス運用報告サイト
</p>

</header>

<div class="login-card reveal">

<h2>
ログイン
</h2>

<input
id="nameInput"
type="text"
placeholder="名前を入力">

<button onclick="login()">

ログイン

</button>

</div>

<div
id="userArea">
</div>

<div class="card reveal">

<h2>
📝 運用報告
</h2>

<p>
大分バスの運用情報を投稿できます
</p>

<a href="https://docs.google.com/forms/d/e/1FAIpQLSeXZvUD99JGgXQ_tSAyy_XgiyACGJfqx-Cq9I81qbbZj5zlRw/viewform?usp=publish-editor">

<button>

運用報告を投稿

</button>

</a>

<button onclick="addPost()">

投稿完了

</button>

<div
id="cooldownText"
class="cooldown">

</div>

<p class="notice">

※ 投稿後に押してください

</p>

</div>

<div class="card reveal">

<div class="card reveal">

<h2>
🚌 バスロケ
</h2>

<p>

路線を選択してください

</p>

<a
href="bus2.html"
class="button">

🚍きゃんバス

<a
href="newroke.html"
class="button">

🚌大洲循環線
  
</a>

</div>

<h2>
📊 みんなの投稿
</h2>

<iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRTlU0bFWVKVjj04Yh6FZv3AYvBvAZZcmsgO7n6w0Bu4FmlAr8S-zZnYQJZPwG9MYctwu687l7RelEV/pubhtml?widget=true&amp;headers=false">

</iframe>

</div>

<script>

function login(){

const name =
document.getElementById(
"nameInput"
).value;

localStorage.setItem(
"username",
name
);

showUser();

}

function addPost(){

const name =
localStorage.getItem(
"username"
);

if(!name){

alert(
"先にログインしてください"
);

return;

}

const now = Date.now();

const lastPostTime =
Number(
localStorage.getItem(
"lastPostTime"
)
) || 0;

const diff =
now - lastPostTime;

if(diff < 30000){

const remain =
Math.ceil(
(30000 - diff)/1000
);

alert(
"連続投稿防止中です。\n" +
remain +
"秒後に再度押してください。"
);

return;

}

let posts =
Number(
localStorage.getItem(
name + "_posts"
)
) || 0;

posts++;

localStorage.setItem(
name + "_posts",
posts
);

localStorage.setItem(
"lastPostTime",
now
);

alert(
"投稿完了！\n30秒後に再度投稿できます。"
);

showUser();

updateCooldown();

}

function updateCooldown(){

const lastPostTime =
Number(
localStorage.getItem(
"lastPostTime"
)
) || 0;

const now = Date.now();

const diff =
now - lastPostTime;

const remain =
Math.ceil(
(30000 - diff)/1000
);

if(remain > 0){

document.getElementById(
"cooldownText"
).innerText =

"次の投稿完了まで " +
remain +
" 秒";

}

else{

document.getElementById(
"cooldownText"
).innerText =

"投稿可能です";

}

}

setInterval(
updateCooldown,
1000
);

function getRank(posts){

if(posts >= 100){

return "💎 プラチナ会員";

}

else if(posts >= 50){

return "🥇 ゴールド会員";

}

else if(posts >= 20){

return "🥈 シルバー会員";

}

else{

return "🥉 ブロンズ会員";

}

}

function showUser(){

const name =
localStorage.getItem(
"username"
);

if(name){

const posts =
Number(
localStorage.getItem(
name + "_posts"
)
) || 0;

const rank =
getRank(posts);

document.getElementById(
"userArea"
).innerHTML = `

<div class="rank-card reveal show">

<h2>
こんにちは ${name}さん
</h2>

<p class="rank">
${rank}
</p>

<p>
投稿回数：${posts}回
</p>

</div>

`;

}

}

showUser();

updateCooldown();

const reveals =
document.querySelectorAll(
".reveal"
);

window.addEventListener(
"scroll",
revealCards
);

function revealCards(){

const trigger =
window.innerHeight * 0.85;

reveals.forEach(card => {

const top =
card.getBoundingClientRect().top;

if(top < trigger){

card.classList.add(
"show"
);

}

});

}

revealCards();

</script>

</body>

</html>
