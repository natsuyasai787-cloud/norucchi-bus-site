<body>

<style>

body{

margin:0;

font-family:sans-serif;

background:#0f0f0f;

color:white;

background-image:
repeating-linear-gradient(
45deg,
rgba(255,255,255,0.03) 0px,
rgba(255,255,255,0.03) 2px,
transparent 2px,
transparent 24px
),
repeating-linear-gradient(
-45deg,
rgba(255,255,255,0.03) 0px,
rgba(255,255,255,0.03) 2px,
transparent 2px,
transparent 24px
);

}

header{

background:
linear-gradient(
135deg,
#111111,
#222222
);

text-align:center;

padding:40px 20px;

border-bottom:
3px solid #d4af37;

box-shadow:
0 4px 15px rgba(0,0,0,0.5);

}

header h1{

margin:0;

font-size:34px;

color:#d4af37;

}

header p{

margin-top:10px;

color:#cccccc;

}

.login-card,
.rank-card,
.card{

background:#1a1a1a;

margin:20px;

padding:25px;

border-radius:20px;

border:
1px solid #333;

box-shadow:
0 4px 15px rgba(0,0,0,0.5);

}

h2{

margin-top:0;

color:#d4af37;

}

input{

width:100%;

padding:14px;

margin-top:10px;

margin-bottom:15px;

font-size:18px;

border-radius:12px;

border:1px solid #555;

background:#111;

color:white;

box-sizing:border-box;

}

button{

width:100%;

padding:15px;

font-size:18px;

border:none;

border-radius:12px;

background:
linear-gradient(
135deg,
#d4af37,
#8b6f1e
);

color:black;

font-weight:bold;

margin-top:10px;

}

button:active{

transform:scale(0.98);

}

.rank{

font-size:32px;

font-weight:bold;

text-align:center;

margin-top:15px;

}

.rank-card h2,
.rank-card p{

text-align:center;

}

table{

width:100%;

border-collapse:collapse;

margin-top:15px;

overflow:hidden;

border-radius:15px;

}

th{

background:#d4af37;

color:black;

padding:12px;

}

td{

padding:12px;

border-bottom:
1px solid #333;

background:#181818;

}

tr:hover td{

background:#222;

}

.notice{

color:#aaa;

font-size:14px;

margin-top:10px;

}

iframe{

width:100%;

height:500px;

border:none;

border-radius:15px;

background:white;

}

</style>

<header>

<h1>
🚌 おおいたバスねっと
</h1>

<p>
大分バス運用報告サイト
</p>

</header>

<div class="login-card">

<h2>
ログイン
</h2>

<input
id="nameInput"
type="text"
placeholder="名前を入力">

<button onclick="login()">

ログイン

</button>

</div>

<div id="userArea"></div>

<div class="card">

<h2>
📝 運用報告
</h2>

<p>
大分バスの運用情報を投稿できます
</p>

<a href="https://docs.google.com/forms/d/e/1FAIpQLSeXZvUD99JGgXQ_tSAyy_XgiyACGJfqx-Cq9I81qbbZj5zlRw/viewform?usp=publish-editor">

<button>

運用報告を投稿

</button>

</a>

<button onclick="addPost()">

投稿完了

</button>

<p class="notice">

※ 投稿後に押してください

</p>

</div>

<div class="card">

<h2>
📊 みんなの投稿
</h2>

<iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRTlU0bFWVKVjj04Yh6FZv3AYvBvAZZcmsgO7n6w0Bu4FmlAr8S-zZnYQJZPwG9MYctwu687l7RelEV/pubhtml?widget=true&amp;headers=false">

</iframe>

</div>

<script>

function login(){

const name =
document.getElementById("nameInput").value;

localStorage.setItem("username",name);

showUser();

}

function addPost(){

const name =
localStorage.getItem("username");

if(!name){

alert("先にログインしてください");

return;

}

let posts =
Number(
localStorage.getItem(name + "_posts")
) || 0;

posts++;

localStorage.setItem(
name + "_posts",
posts
);

showUser();

}

function getRank(posts){

if(posts >= 100){

return "💎 プラチナ会員";

}

else if(posts >= 50){

return "🥇 ゴールド会員";

}

else if(posts >= 20){

return "🥈 シルバー会員";

}

else{

return "🥉 ブロンズ会員";

}

}

function showUser(){

const name =
localStorage.getItem("username");

if(name){

const posts =
Number(
localStorage.getItem(name + "_posts")
) || 0;

const rank =
getRank(posts);

document.getElementById("userArea")
.innerHTML = `

<div class="rank-card">

<h2>
こんにちは ${name}さん
</h2>

<p class="rank">
${rank}
</p>

<p>
投稿回数：${posts}回
</p>

</div>

`;

}

}

showUser();

</script>

</body>
