<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>大洲循環線 β版</title>

<style>

body{
margin:0;
background:#050505;
color:white;
font-family:sans-serif;
}

header{
text-align:center;
padding:25px;
border-bottom:3px solid gold;
}

header h1{
margin:0;
color:gold;
}

#todayType{
text-align:center;
margin-top:10px;
font-size:22px;
color:#aaa;
}

#clock{
text-align:center;
font-size:32px;
color:#00ffcc;
margin-top:10px;
}

.line-area{
position:relative;
max-width:500px;
margin:40px auto;
padding-bottom:80px;
}

.main-line{
position:absolute;
left:50%;
transform:translateX(-50%);
width:8px;
height:100%;
background:white;
}

.stop{
position:relative;
margin:50px 0;
display:flex;
justify-content:center;
}

.stop-name{
background:#111;
border:2px solid #333;
border-radius:15px;
padding:12px 24px;
z-index:2;
}

.bus{
position:absolute;
width:32px;
height:32px;
border-radius:50%;
top:0;
}

.red{
background:red;
left:60px;
}

.blue{
background:#4da6ff;
right:60px;
}

.green{
background:#00d26a;
left:10px;
}

.yellow{
background:yellow;
right:10px;
}

.purple{
background:violet;
left:-40px;
}

.white{
background:white;
right:-40px;
}

</style>
</head>

<body>

<header>
<h1>大洲循環線 β版</h1>
</header>

<div id="todayType"></div>
<div id="clock"></div>

<div class="line-area">

<div class="main-line"></div>

<div class="stop" id="stop0"><div class="stop-name">上野</div></div>
<div class="stop" id="stop1"><div class="stop-name">大分駅前</div></div>
<div class="stop" id="stop2"><div class="stop-name">中央通り</div></div>
<div class="stop" id="stop3"><div class="stop-name">県庁前</div></div>
<div class="stop" id="stop4"><div class="stop-name">競技場前</div></div>
<div class="stop" id="stop5"><div class="stop-name">大津町一丁目</div></div>
<div class="stop" id="stop6"><div class="stop-name">大洲運動公園前</div></div>
<div class="stop" id="stop7"><div class="stop-name">商業高校前</div></div>
<div class="stop" id="stop8"><div class="stop-name">古ヶ鶴公民館入口</div></div>
<div class="stop" id="stop9"><div class="stop-name">中央通り④</div></div>

</div>

<script>

const sunday = {

c30:[

[137,138,139,140,141,142,143,144,145,146]

],

c10:[],
c11:[],
c12:[],
c13:[],
k65:[],
k88:[]

};

// ======================
// 曜日判定
// ======================

const today = new Date().getDay();

let activeData;
let dayText;

if(today === 0){

activeData = sunday;
dayText = "本日は日祝ダイヤ";

}
else if(today === 6){

activeData = saturday;
dayText = "本日は土曜ダイヤ";

}
else{

activeData = weekday;
dayText = "本日は平日ダイヤ";

}

document.getElementById("todayType").innerHTML =
dayText;


// ======================
// 時計
// ======================

function updateClock(){

const now = new Date();

const h =
String(now.getHours()).padStart(2,"0");

const m =
String(now.getMinutes()).padStart(2,"0");

const s =
String(now.getSeconds()).padStart(2,"0");

document.getElementById("clock").innerHTML =
h + ":" + m + ":" + s;

}


// ======================
// 現在時刻取得
// ======================

function getNow(){

const now = new Date();

return now.getHours() * 100 +
now.getMinutes();

}


// ======================
// バス削除
// ======================

function clearBus(){

document
.querySelectorAll(".bus")
.forEach(v => v.remove());

}


// ======================
// バス表示
// ======================

function drawBus(stopIndex,color){

const stop =
document.getElementById(
"stop" + stopIndex
);

if(!stop) return;

const bus =
document.createElement("div");

bus.className =
"bus " + color;

stop.appendChild(bus);

}


// ======================
// 路線処理
// ======================

function processRoute(routeData,color){

const now = getNow();

routeData.forEach(trip => {

for(let i=0;i<trip.length-1;i++){

const start = trip[i];
const end = trip[i+1];

if(now >= start && now < end){

drawBus(i,color);

}

}

});

}


// ======================
// 更新
// ======================

function updateBus(){

clearBus();

processRoute(activeData.c30,"red");
processRoute(activeData.c10,"blue");
processRoute(activeData.c11,"green");
processRoute(activeData.c12,"yellow");
processRoute(activeData.c13,"purple");
processRoute(activeData.k65,"white");
processRoute(activeData.k88,"white");

}

updateClock();
updateBus();

setInterval(updateClock,1000);
setInterval(updateBus,30000);

</script>

</body>
</html>
