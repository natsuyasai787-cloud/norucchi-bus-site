/*

*/

const now = new Date();

const current =
now.getHours() * 100 +

const blueBus =
document.getElementById("blueBus");



/*
時間変換
*/

function toMinutes(t){

const h = Math.floor(t / 100);
const m = t % 100;

return h * 60 + m;

}

const currentMinutes =
now.getHours() * 60 +
now.getMinutes();



/*
バス位置計算
*/

function updateBus(){

for(let trip of c30){

for(let i = 0; i < trip.length - 1; i++){

const start = toMinutes(trip[i]);
const end = toMinutes(trip[i+1]);

if(
currentMinutes >= start &&
currentMinutes <= end
){

const ratio =
(currentMinutes - start)
/
(end - start);

const top =
stopPositions[i]
+
(
(stopPositions[i+1] - stopPositions[i])
* ratio
);

blueBus.style.top =
top + "px";

return;

}

}

}

blueBus.style.display = "none";
redbus.style.display = "none";

}

updateBus();
