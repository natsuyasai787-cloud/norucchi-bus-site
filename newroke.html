<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>C30 大洲循環線 バスロケ</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#eef3f8;
color:#222;
}

header{
background:#0078ff;
color:white;
padding:18px;
font-size:28px;
font-weight:bold;
text-align:center;
}

.wrap{
padding:16px;
max-width:700px;
margin:auto;
}

.card{
background:white;
border-radius:18px;
padding:18px;
margin-bottom:18px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.label{
font-size:14px;
color:#666;
margin-bottom:8px;
}

select{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:12px;
background:#edf4ff;
margin-bottom:14px;
}

.location{
text-align:center;
font-size:28px;
font-weight:bold;
line-height:2;
}

.station{
font-size:22px;
}

.blue{
font-size:34px;
}

.red{
font-size:34px;
}

.next{
text-align:center;
font-size:34px;
font-weight:bold;
line-height:1.8;
}

.timebox{
background:#0078ff;
color:white;
padding:14px;
border-radius:14px;
margin-bottom:10px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.sub{
text-align:center;
font-size:18px;
margin-top:10px;
line-height:1.8;
}

</style>
</head>

<body>

<header>
C30 大洲循環線
</header>

<div class="wrap">

<div class="card">

<div class="label">
停留所選択
</div>

<select id="stationSelect">

<option>大分駅前⑥</option>
<option>中央通り⑥</option>
<option>県庁前</option>
<option>競技場前</option>
<option>大津町一丁目</option>
<option>大洲運動公園前</option>
<option>商業高校前</option>
<option>古ヶ鶴公民館入口</option>
<option>県庁前（戻り）</option>
<option>中央通り③</option>
<option>大分駅前③</option>

</select>

<div class="label">
ダイヤ
</div>

<select id="mode">

<option value="week">平日</option>
<option value="sat">土曜</option>
<option value="sun">日祝</option>

</select>

</div>

<div class="card">

<div class="label">
現在位置イメージ
</div>

<div class="location">

<span id="prevStop" class="station">
--
</span>

<span class="blue">
🔵
</span>

→

<span class="red">
🔴
</span>

<span id="nowStop" class="station">
--
</span>

</div>

<div class="sub">

駅間：約
<span id="sectionMin">0</span>
分

</div>

</div>

<div class="card">

<div class="label">
次のバス
</div>

<div class="next" id="nextBus">

--:--

</div>

</div>

<div class="card">

<div class="label">
この停留所の時刻
</div>

<div id="times"></div>

</div>

</div>

<script>

/* 上野除外済み */

const stops=[
"大分駅前⑥",
"中央通り⑥",
"県庁前",
"競技場前",
"大津町一丁目",
"大洲運動公園前",
"商業高校前",
"古ヶ鶴公民館入口",
"県庁前（戻り）",
"中央通り③",
"大分駅前③"
];

/* 駅間 */

const move=[
2,
4,
5,
1,
3,
2,
5,
9,
5,
1
];

/* 平日 */

const week=[
"09:24",
"09:39",
"10:24",
"10:54",
"11:24",
"12:04",
"12:34",
"12:54",
"13:05",
"13:54",
"14:24",
"14:54",
"15:24",
"15:54",
"16:54",
"17:24",
"17:54",
"18:54",
"19:34"
];

/* 土曜 */

const sat=[
"09:24",
"09:54",
"10:24",
"10:54",
"11:24",
"11:54",
"12:24",
"12:54",
"13:24",
"13:54",
"14:24",
"14:54",
"15:24",
"15:54",
"16:24",
"16:54",
"17:24",
"17:54",
"18:54",
"19:54"
];

/* 日祝 */

const sun=[
"09:24",
"09:54",
"10:24",
"10:54",
"11:24",
"11:54",
"12:34",
"12:54",
"13:05",
"13:54",
"14:24",
"14:54",
"15:24",
"15:54",
"16:54",
"17:24",
"17:54",
"18:54",
"19:34"
];

function addMin(time,min){

let[h,m]=time.split(":").map(Number);

m+=min;

while(m>=60){

h++;
m-=60;

}

return String(h).padStart(2,"0")
+":"
+
String(m).padStart(2,"0");

}

function getBase(){

const mode=
document.getElementById("mode").value;

if(mode==="week") return week;

if(mode==="sat") return sat;

return sun;

}

function timeToMin(t){

const[h,m]=t.split(":").map(Number);

return h*60+m;

}

function update(){

const idx=
document.getElementById("stationSelect")
.selectedIndex;

const prev=
idx===0
? "始発"
: stops[idx-1];

const now=
stops[idx];

document.getElementById("prevStop")
.innerHTML=prev;

document.getElementById("nowStop")
.innerHTML=now;

const section=
idx===0
? 0
: move[idx-1];

document.getElementById("sectionMin")
.innerHTML=section;

/* 累積時間 */

let total=0;

for(let i=0;i<idx;i++){

total+=move[i];

}

const base=getBase();

const result=[];

base.forEach(t=>{

result.push(
addMin(t,total)
);

});

/* 時刻 */

const list=
document.getElementById("times");

list.innerHTML="";

result.forEach(t=>{

list.innerHTML+=`

<div class="timebox">

${t}

</div>

`;

});

/* 次のバス */

const nowTime=
new Date();

const current=
String(nowTime.getHours())
.padStart(2,"0")
+":"
+
String(nowTime.getMinutes())
.padStart(2,"0");

let next="本日の運行終了";

for(let t of result){

if(timeToMin(t)>=timeToMin(current)){

next=t;

break;

}

}

document.getElementById("nextBus")
.innerHTML=next;

}

update();

document
.getElementById("stationSelect")
.addEventListener("change",update);

document
.getElementById("mode")
.addEventListener("change",update);

</script>

</body>
</html>
