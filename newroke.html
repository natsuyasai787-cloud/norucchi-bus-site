<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>C30 大洲循環線 バスロケ</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#eef3f8;
color:#222;
}

header{
background:#0078ff;
color:white;
padding:18px;
font-size:28px;
font-weight:bold;
text-align:center;
}

.wrap{
padding:16px;
max-width:1100px;
margin:auto;
}

.card{
background:white;
border-radius:18px;
padding:18px;
margin-bottom:18px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.label{
font-size:14px;
color:#666;
margin-bottom:8px;
}

select{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:12px;
background:#edf4ff;
margin-bottom:14px;
}

.route{
display:flex;
align-items:flex-start;
overflow-x:auto;
padding:30px 0;
}

.stop{
min-width:140px;
text-align:center;
position:relative;
font-size:14px;
font-weight:bold;
}

.line{
position:absolute;
top:14px;
left:70px;
width:140px;
height:5px;
background:#ccc;
z-index:-1;
}

.circle{
width:34px;
height:34px;
border-radius:50%;
background:#bbb;
margin:auto;
margin-bottom:8px;
}

.bus{
background:#0078ff;
box-shadow:0 0 16px #0078ff;
}

.bus2{
background:#ff9800;
box-shadow:0 0 16px #ff9800;
}

.bus3{
background:#00c853;
box-shadow:0 0 16px #00c853;
}

.businfo{
margin-top:8px;
font-size:14px;
font-weight:bold;
line-height:1.7;
}

.next{
text-align:center;
font-size:34px;
font-weight:bold;
line-height:1.8;
}

.timebox{
background:#0078ff;
color:white;
padding:14px;
border-radius:14px;
margin-bottom:10px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.legend{
display:flex;
gap:18px;
flex-wrap:wrap;
margin-top:10px;
font-size:15px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
C30 大洲循環線
</header>

<div class="wrap">

<div class="card">

<div class="label">
停留所選択
</div>

<select id="stationSelect">

<option>大分駅前⑥</option>
<option>中央通り⑥</option>
<option>県庁前</option>
<option>競技場前</option>
<option>大津町一丁目</option>
<option>大洲運動公園前</option>
<option>商業高校前</option>
<option>古ヶ鶴公民館入口</option>
<option>県庁前（戻り）</option>
<option>中央通り③</option>
<option>大分駅前③</option>

</select>

<div class="label">
ダイヤ
</div>

<select id="mode">

<option value="week">平日</option>
<option value="sat">土曜</option>
<option value="sun">日祝</option>

</select>

<div class="legend">

<div>🔵 バス1</div>
<div>🟠 バス2</div>
<div>🟢 バス3</div>

</div>

</div>

<div class="card">

<div class="label">
現在のバス位置
</div>

<div class="route" id="route"></div>

</div>

<div class="card">

<div class="label">
次のバス
</div>

<div class="next" id="nextBus">

--:--

</div>

</div>

<div class="card">

<div class="label">
この停留所の時刻
</div>

<div id="times"></div>

</div>

</div>

<script>

const stops=[
"大分駅前⑥",
"中央通り⑥",
"県庁前",
"競技場前",
"大津町一丁目",
"大洲運動公園前",
"商業高校前",
"古ヶ鶴公民館入口",
"県庁前（戻り）",
"中央通り③",
"大分駅前③"
];

const move=[
2,
4,
5,
1,
3,
2,
5,
9,
5,
1
];

const week=[
"09:24",
"09:39",
"10:24",
"10:54",
"11:24",
"11:54",
"12:34",
"12:54",
"13:05",
"13:54",
"14:24",
"14:54",
"15:24",
"15:54",
"16:54",
"17:24",
"17:54",
"18:54",
"19:34"
];

const sat=[
"09:24",
"09:54",
"10:24",
"10:54",
"11:24",
"11:54",
"12:24",
"12:54",
"13:24",
"13:54",
"14:24",
"14:54",
"15:24",
"15:54",
"16:24",
"16:54",
"17:24",
"17:54",
"18:54",
"19:54"
];

const sun=[
"09:24",
"09:54",
"10:24",
"10:54",
"11:24",
"11:54",
"12:34",
"12:54",
"13:05",
"13:54",
"14:24",
"14:54",
"15:24",
"15:54",
"16:54",
"17:24",
"17:54",
"18:54",
"19:34"
];

function addMin(time,min){

let[h,m]=time.split(":").map(Number);

m+=min;

while(m>=60){

h++;
m-=60;

}

return String(h).padStart(2,"0")
+":"
+
String(m).padStart(2,"0");

}

function getBase(){

const mode=
document.getElementById("mode").value;

if(mode==="week") return week;

if(mode==="sat") return sat;

return sun;

}

function timeToMin(t){

const[h,m]=t.split(":").map(Number);

return h*60+m;

}

function update(){

const idx=
document.getElementById("stationSelect")
.selectedIndex;

let total=0;

for(let i=0;i<idx;i++){

total+=move[i];

}

const base=getBase();

const result=[];

base.forEach(t=>{

result.push(
addMin(t,total)
);

});

/* 時刻表 */

const list=
document.getElementById("times");

list.innerHTML="";

result.forEach(t=>{

list.innerHTML+=`

<div class="timebox">

${t}

</div>

`;

});

/* 次のバス */

const nowTime=
new Date();

const current=
String(nowTime.getHours())
.padStart(2,"0")
+":"
+
String(nowTime.getMinutes())
.padStart(2,"0");

let next="本日の運行終了";

for(let t of result){

if(timeToMin(t)>=timeToMin(current)){

next=t;

break;

}

}

document.getElementById("nextBus")
.innerHTML=next;

/* バス位置 */

const route=
document.getElementById("route");

route.innerHTML="";

let activeBuses=[];

base.forEach((b,index)=>{

let generated=[];

let total2=0;

generated.push(b);

for(let i=0;i<move.length;i++){

total2+=move[i];

generated.push(
addMin(b,total2)
);

}

for(let i=0;i<generated.length-1;i++){

const nowm=
timeToMin(current);

const start=
timeToMin(generated[i]);

const end=
timeToMin(generated[i+1]);

if(nowm>=start && nowm<end){

let remainToSelected=0;

if(i<idx){

for(let k=i;k<idx;k++){

remainToSelected+=move[k];

}

remainToSelected-=(
nowm-start
);

}else{

remainToSelected=0;

}

activeBuses.push({

index:i,
remain:remainToSelected,
bus:index%3

});

}

}

});

stops.forEach((s,i)=>{

let busHTML="";

activeBuses.forEach(b=>{

if(b.index===i){

let cls="bus";

if(b.bus===1) cls="bus2";
if(b.bus===2) cls="bus3";

busHTML+=`

<div class="circle ${cls}"></div>

<div class="businfo">

${b.remain}分後到着

</div>

`;

}

});

route.innerHTML+=`

<div class="stop">

${i<stops.length-1
?'<div class="line"></div>'
:''}

${busHTML || '<div class="circle"></div>'}

${s}

</div>

`;

});

}

update();

setInterval(update,1000);

document
.getElementById("stationSelect")
.addEventListener("change",update);

document
.getElementById("mode")
.addEventListener("change",update);

</script>

</body>
</html>
